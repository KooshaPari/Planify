# SonarCloud configuration for Planify (KooshaPari/Planify)
# CI-based analysis. Automatic Analysis is disabled for this project so that
# every push to master refreshes the baseline deterministically.

sonar.projectKey=KooshaPari_plane
sonar.organization=kooshapari

# Analyze the whole repo; let language detection handle Python + JS/TS.
sonar.sources=.

# Exclude vendored / generated / 3rd-party code so duplication, hotspots and
# ncloc are not inflated by code we do not own.
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/out/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/workbox-*.js,\
  **/sw.js,\
  **/public/**,\
  **/static/**,\
  **/vendor/**,\
  **/*.lock,\
  **/pnpm-lock.yaml,\
  **/locales/**,\
  **/packages/i18n/**/*.json,\
  **/locale/**,\
  **/*.snap,\
  **/.venv/**,\
  **/venv/**

# Tests / fixtures should not count as production sources.
sonar.test.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/test_*.py,\
  **/tests/**,\
  **/e2e/**

# Encoding
sonar.sourceEncoding=UTF-8
