version: "3"

vars:
  REPO_LANGUAGE:
    sh: |
      if [ -f package.json ] || [ -f pnpm-lock.yaml ] || [ -f bun.lock ] || [ -f bun.lockb ]; then
        printf "typescript"
      elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
        printf "python"
      elif [ -f go.mod ]; then
        printf "go"
      else
        printf "unknown"
      fi
  PACKAGE_MANAGER:
    sh: |
      if [ -f package.json ] && grep -q '"packageManager": "pnpm@' package.json; then
        printf "pnpm"
      elif [ -f pnpm-lock.yaml ]; then
        printf "pnpm"
      elif [ -f package.json ] && grep -q '"packageManager": "bun@' package.json; then
        printf "bun"
      elif [ -f bun.lock ] || [ -f bun.lockb ]; then
        printf "bun"
      elif [ -f package-lock.json ]; then
        printf "npm"
      else
        printf "npm"
      fi

tasks:
  build:
    desc: Build the repository using the detected language/toolchain
    cmds:
      - |
          case "{{.REPO_LANGUAGE}}" in
            typescript)
              {{.PACKAGE_MANAGER}} run build
              ;;
            python)
              python -m build
              ;;
            go)
              go build ./...
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANGUAGE}}" >&2
              exit 1
              ;;
          esac

  test:
    desc: Run repository tests
    cmds:
      - |
          case "{{.REPO_LANGUAGE}}" in
            typescript)
              if [ "{{.PACKAGE_MANAGER}}" = "pnpm" ]; then
                pnpm turbo run test
              else
                {{.PACKAGE_MANAGER}} run test
              fi
              ;;
            python)
              pytest
              ;;
            go)
              go test ./...
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANGUAGE}}" >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run repository lint checks
    cmds:
      - |
          case "{{.REPO_LANGUAGE}}" in
            typescript)
              {{.PACKAGE_MANAGER}} run check:lint
              ;;
            python)
              ruff check .
              ;;
            go)
              golangci-lint run
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANGUAGE}}" >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - |
          case "{{.REPO_LANGUAGE}}" in
            typescript)
              rm -rf .turbo .next .react-router dist build coverage storybook-static playwright-report test-results
              find apps packages -type d \( \
                -name .turbo -o \
                -name .next -o \
                -name .react-router -o \
                -name dist -o \
                -name build -o \
                -name coverage -o \
                -name storybook-static -o \
                -name playwright-report -o \
                -name test-results \
              \) -prune -exec rm -rf '{}' +
              ;;
            python)
              rm -rf build dist .pytest_cache .ruff_cache .mypy_cache .coverage htmlcov
              find . -type d -name __pycache__ -prune -exec rm -rf '{}' +
              ;;
            go)
              go clean ./...
              ;;
            *)
              echo "Unsupported repository language: {{.REPO_LANGUAGE}}" >&2
              exit 1
              ;;
          esac
