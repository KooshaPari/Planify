version: "3"

vars:
  LANGUAGE:
    sh: |
      has_typescript=false
      has_python=false
      has_javascript=false

      if find . -path ./node_modules -prune -o -name tsconfig.json -print -quit | grep -q .; then
        has_typescript=true
      fi

      if find . -path ./node_modules -prune -o \( -name pyproject.toml -o -name requirements.txt \) -print -quit | grep -q .; then
        has_python=true
      fi

      if find . -path ./node_modules -prune -o -name package.json -print -quit | grep -q .; then
        has_javascript=true
      fi

      labels=""
      if [ "$has_typescript" = "true" ]; then
        labels="${labels}typescript"
      elif [ "$has_javascript" = "true" ]; then
        labels="${labels}javascript"
      fi

      if [ "$has_python" = "true" ]; then
        labels="${labels:+$labels+}python"
      fi

      echo "${labels:-unknown}"
  PACKAGE_MANAGER:
    sh: |
      if [ -f pnpm-lock.yaml ]; then
        echo pnpm
      elif [ -f bun.lock ] || [ -f bun.lockb ]; then
        echo bun
      elif [ -f yarn.lock ]; then
        echo yarn
      elif [ -f package-lock.json ]; then
        echo npm
      else
        echo pnpm
      fi
  TASK_RUNNER:
    sh: |
      if [ -f turbo.json ]; then
        echo turbo
      else
        echo none
      fi

tasks:
  default:
    desc: List available tasks for the detected workspace
    cmds:
      - task --list

  build:
    desc: Build the detected workspace
    summary: |
      Detected language: {{.LANGUAGE}}
      Package manager: {{.PACKAGE_MANAGER}}
    cmds:
      - |
        if [ -f package.json ]; then
          {{.PACKAGE_MANAGER}} run build
        elif [ -f pyproject.toml ]; then
          uv run python -m build
        else
          echo "No supported build command for detected language: {{.LANGUAGE}}" >&2
          exit 1
        fi

  test:
    desc: Run workspace tests
    summary: |
      Detected language: {{.LANGUAGE}}
      Package manager: {{.PACKAGE_MANAGER}}
    cmds:
      - |
        if [ -f package.json ] && [ "{{.TASK_RUNNER}}" = "turbo" ]; then
          {{.PACKAGE_MANAGER}} turbo run test
        elif [ -f package.json ]; then
          {{.PACKAGE_MANAGER}} run test
        elif [ -f pyproject.toml ]; then
          uv run pytest
        else
          echo "No supported test command for detected language: {{.LANGUAGE}}" >&2
          exit 1
        fi

  lint:
    desc: Run lint checks across the workspace
    summary: |
      Detected language: {{.LANGUAGE}}
      Package manager: {{.PACKAGE_MANAGER}}
    cmds:
      - |
        if [ -f package.json ]; then
          {{.PACKAGE_MANAGER}} run check:lint
        elif [ -f pyproject.toml ]; then
          uv run ruff check .
        else
          echo "No supported lint command for detected language: {{.LANGUAGE}}" >&2
          exit 1
        fi

  clean:
    desc: Remove generated artifacts and dependencies
    summary: |
      Detected language: {{.LANGUAGE}}
      Package manager: {{.PACKAGE_MANAGER}}
    cmds:
      - |
        if [ -f package.json ]; then
          {{.PACKAGE_MANAGER}} run clean
        elif [ -f pyproject.toml ]; then
          rm -rf .pytest_cache .ruff_cache .mypy_cache dist build *.egg-info
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
        else
          rm -rf dist build
        fi
