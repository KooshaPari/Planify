name: Build and lint API

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "preview"
    types:
      - "opened"
      - "synchronize"
      - "ready_for_review"
      - "review_requested"
      - "reopened"
    paths:
      - "apps/api/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.requested_reviewers != null
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405@a26af69be951a213d495a4c3e4e4022e16d87065 # v6
        with:
          python-version: "3.12.x"
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements.txt'
      - name: Install Pylint
        run: python -m pip install ruff
      - name: Install API Dependencies
        run: cd apps/api && pip install -r requirements.txt
      - name: Lint apps/api
        run: ruff check --fix apps/api
