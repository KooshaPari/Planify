name: Build and lint API

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "preview"
    types:
      - "opened"
      - "synchronize"
      - "ready_for_review"
      - "review_requested"
      - "reopened"
    paths:
      - "apps/api/**"
  actions: read

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-24.04
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.requested_reviewers != null
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.12.x"
          cache: 'pip'
          cache-dependency-path: 'apps/api/requirements.txt'
      - name: Install Pylint
        run: python -m pip install ruff
      - name: Install API Dependencies
        run: cd apps/api && pip install -r requirements.txt
      - name: Lint apps/api
        run: ruff check --fix apps/api
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

